<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Interview Prep — ResumeAI</title>
    <link rel="icon" type="image/png" href="/static/seo.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">ResumeAI</h1>
    <div class="flex gap-4 items-center">
        <a href="analyzer.html" class="text-sm text-blue-600 hover:underline">Analyzer</a>
        <a href="history.html" class="text-sm text-blue-600 hover:underline">History</a>
        <span id="userEmail" class="text-sm text-gray-500"></span>
        <button onclick="logout()" class="text-sm text-red-500 hover:underline">Logout</button>
    </div>
</nav>

<!-- Main -->
<div class="max-w-3xl mx-auto px-4 py-8">

    <!-- Upload Card -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-1">Interview Prep</h2>
        <p class="text-sm text-gray-500 mb-4">Upload your resume and job description to get personalized interview questions.</p>

        <!-- Error Alert -->
        <div id="errorAlert" class="hidden bg-red-100 text-red-700 text-sm px-4 py-3 rounded mb-4"></div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Upload Resume (PDF)</label>
            <input id="resumeFile" type="file" accept=".pdf"
                   class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Job Description</label>
            <textarea id="jobDescription" rows="5" placeholder="Paste the job description here..."
                      class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>

        <button id="generateBtn" onclick="handleGenerate()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">
            Generate Interview Questions
        </button>
    </div>

    <!-- Results Section -->
    <div id="results" class="hidden space-y-4">

        <!-- Technical Questions -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-base font-semibold text-blue-600 mb-3">💻 Technical Questions</h3>
            <ol id="technicalQuestions" class="list-decimal list-inside text-sm text-gray-700 space-y-2"></ol>
        </div>

        <!-- HR Questions -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-base font-semibold text-green-600 mb-3">👔 HR Questions</h3>
            <ol id="hrQuestions" class="list-decimal list-inside text-sm text-gray-700 space-y-2"></ol>
        </div>

        <!-- Coding Questions -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-base font-semibold text-purple-600 mb-3">🧠 Coding Questions</h3>
            <ol id="codingQuestions" class="list-decimal list-inside text-sm text-gray-700 space-y-2"></ol>
        </div>

    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8080';

    // Auth check
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    // Show user email
    const email = localStorage.getItem('userEmail');
    if (email) document.getElementById('userEmail').textContent = email;

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('userEmail');
      window.location.href = 'login.html';
    }

    function showError(message) {
      const el = document.getElementById('errorAlert');
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function parseQuestions(text) {
      const result = {
        technical: [],
        hr: [],
        coding: []
      };

      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      let currentSection = null;

      for (const line of lines) {
        if (line.toUpperCase().includes('TECHNICAL QUESTIONS')) { currentSection = 'technical'; continue; }
        if (line.toUpperCase().includes('HR QUESTIONS')) { currentSection = 'hr'; continue; }
        if (line.toUpperCase().includes('CODING QUESTIONS')) { currentSection = 'coding'; continue; }

        if (line.startsWith('-')) {
          const item = line.replace(/^-\s*/, '');
          if (currentSection === 'technical') result.technical.push(item);
          else if (currentSection === 'hr') result.hr.push(item);
          else if (currentSection === 'coding') result.coding.push(item);
        }
      }

      return result;
    }

    function renderList(id, items) {
      const ol = document.getElementById(id);
      ol.innerHTML = '';
      if (items.length === 0) {
        ol.innerHTML = '<li class="text-gray-400">No questions found.</li>';
        return;
      }
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ol.appendChild(li);
      });
    }

    async function handleGenerate() {
      const file = document.getElementById('resumeFile').files[0];
      const jd = document.getElementById('jobDescription').value.trim();
      const btn = document.getElementById('generateBtn');

      if (!file) { showError('Please upload a PDF resume.'); return; }
      if (!jd) { showError('Please enter a job description.'); return; }

      // Hide previous results
      document.getElementById('results').classList.add('hidden');

      btn.textContent = 'Generating...';
      btn.disabled = true;

      try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('jobDescription', jd);

        const res = await fetch(`${BASE_URL}/api/resume/interview-prep`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'login.html';
          return;
        }

        if (!res.ok) {
          const err = await res.text();
          showError(err || 'Failed to generate questions.');
          return;
        }

        const text = await res.text();
        const parsed = parseQuestions(text);

        renderList('technicalQuestions', parsed.technical);
        renderList('hrQuestions', parsed.hr);
        renderList('codingQuestions', parsed.coding);

        document.getElementById('results').classList.remove('hidden');
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

      } catch (err) {
        showError('Network error. Please check your connection.');
      } finally {
        btn.textContent = 'Generate Interview Questions';
        btn.disabled = false;
      }
    }
</script>

</body>
</html>
