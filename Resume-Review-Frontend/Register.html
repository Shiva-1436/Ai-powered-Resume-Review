<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — ResumeAI</title>
    <link rel="icon" type="image/png" href="/static/seo.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">ResumeAI</h1>
    <p class="text-center text-gray-500 text-sm mb-6">Create your account</p>

    <!-- Error Alert -->
    <div id="errorAlert" class="hidden bg-red-100 text-red-700 text-sm px-4 py-3 rounded mb-4"></div>
    <!-- Success Alert -->
    <div id="successAlert" class="hidden bg-green-100 text-green-700 text-sm px-4 py-3 rounded mb-4"></div>

    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input id="name" type="text" placeholder="John Doe"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input id="email" type="email" placeholder="you@example.com"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <button id="registerBtn" onclick="handleRegister()"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">
        Create Account
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
        Already have an account?
        <a href="login.html" class="text-blue-600 hover:underline font-medium">Sign In</a>
    </p>

</div>

<script>
<!--    const BASE_URL = 'https://ai-powered-resume-review-production.up.railway.app';-->
        const BASE_URL = 'http://localhost:8080';
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'analyzer.html';
    }

    function showAlert(type, message) {
      const el = document.getElementById(type === 'error' ? 'errorAlert' : 'successAlert');
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    async function handleRegister() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('registerBtn');

      if (!name || !email || !password) {
        showAlert('error', 'Please fill in all fields.');
        return;
      }

      if (password.length < 6) {
        showAlert('error', 'Password must be at least 6 characters.');
        return;
      }

      btn.textContent = 'Creating Account...';
      btn.disabled = true;

      try {
        const res = await fetch(`${BASE_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.text();

        if (res.ok) {
          showAlert('success', 'Account created! Redirecting to login...');
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          showAlert('error', data || 'Registration failed. Please try again.');
        }
      } catch (err) {
        showAlert('error', 'Network error. Please check your connection.');
      } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleRegister();
    });
</script>

</body>
</html>
